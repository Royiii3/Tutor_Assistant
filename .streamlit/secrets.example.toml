# Streamlit Cloud 部署用密钥配置
# 复制此文件为 secrets.toml（本地测试），或在 Streamlit Cloud Dashboard 中配置
#
# 部署步骤:
#   1. 在 https://share.streamlit.io 打开你的 App
#   2. 点击 Settings → Secrets
#   3. 把下面的内容粘贴进去（替换成你的真实值）
#   4. 保存并重启 App
#
# 注意: secrets.toml 已在 .gitignore 中，不会被提交到 GitHub

# ---- 必填 ----
amap_key = "你的高德地图API密钥"
bark_key = "你的Bark推送密钥"

# ---- 筛选配置 ----
my_address = "你的地址"
my_coords = [120.000, 30.000]
min_salary = 120
subjects = ["数学", "英语"]
grades = ["高一", "高二"]
max_commute_time = 35
commute_mode = "电动自行车"
skip_districts = ["西湖区", "上城区"]
target_groups = ["群名称"]

# ---- 可选 ----
deepseek_key = "你的DeepSeek API密钥（可选）"
my_gender = "男"
my_identity = "大学生"
